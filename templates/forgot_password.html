<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Pianova</title>
    <style>
        :root {
            --ink: #0a0906;
            --gold: #e1b348;
            --gold-soft: #f3d68f;
            --text: #f6ebd2;
            --muted: #d9c8a4;
            --panel: rgba(10, 10, 10, 0.58);
            --border: rgba(226, 179, 71, 0.38);
            --danger: #ffaca1;
            --success: #b7edc1;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #070603;
            color: var(--text);
            overflow: hidden;
        }
        .video-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5) saturate(1.1);
            z-index: -3;
        }
        .backdrop {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 78%, rgba(243, 193, 74, 0.5), rgba(243, 193, 74, 0.06) 28%, rgba(0,0,0,0) 55%),
                linear-gradient(180deg, rgba(0,0,0,0.62), rgba(0,0,0,0.78));
            z-index: -2;
        }
        .dust {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle, rgba(255,221,137,0.42) 1px, transparent 1px),
                radial-gradient(circle, rgba(245,201,98,0.28) 1px, transparent 1px);
            background-size: 3px 3px, 5px 5px;
            background-position: 0 0, 2px 3px;
            opacity: 0.35;
            animation: drift 20s linear infinite;
            z-index: -1;
        }
        @keyframes drift {
            from { transform: translateY(0); }
            to   { transform: translateY(24px); }
        }
        .layout {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 440px;
            padding: 36px 32px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 24px 70px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,228,169,0.06);
            backdrop-filter: blur(8px);
        }
        .logo-wrap {
            text-align: center;
            margin-bottom: 8px;
        }
        .logo-wrap img {
            width: 160px;
            max-width: 100%;
            mix-blend-mode: lighten;
            filter: drop-shadow(0 0 14px rgba(225,179,72,0.35));
        }
        .icon {
            text-align: center;
            font-size: 2.6rem;
            margin-bottom: 6px;
        }
        h1 {
            margin: 0 0 6px;
            text-align: center;
            font-size: clamp(1.5rem, 3.5vw, 2rem);
            letter-spacing: 0.05em;
            color: var(--gold-soft);
            text-shadow: 0 0 28px rgba(241,193,91,0.28);
        }
        .subtext {
            margin: 0 0 24px;
            text-align: center;
            color: var(--muted);
            line-height: 1.5;
            font-size: 0.92rem;
        }
        form { display: grid; gap: 14px; }
        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #f3dbab;
        }
        input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 13px;
            border: 1px solid rgba(243,202,109,0.2);
            background: rgba(12,10,5,0.65);
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.22s, box-shadow 0.22s;
        }
        input::placeholder { color: rgba(239,217,168,0.48); }
        input:focus {
            outline: none;
            border-color: rgba(243,203,113,0.72);
            box-shadow: 0 0 0 3px rgba(223,180,77,0.2);
        }
        button {
            border: 0;
            border-radius: 13px;
            margin-top: 4px;
            padding: 13px 18px;
            font-weight: 700;
            letter-spacing: 0.03em;
            background: linear-gradient(140deg, #c7912f, #f4cd73 50%, #ab7723);
            color: #1f1402;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 10px 24px rgba(183,129,31,0.33);
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(183,129,31,0.4);
        }
        .flash {
            margin-bottom: 12px;
            padding: 11px 12px;
            border-radius: 11px;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }
        .flash.error {
            background: rgba(255,90,90,0.14);
            color: var(--danger);
            border-color: rgba(255,146,146,0.25);
        }
        .flash.success {
            background: rgba(128,235,160,0.14);
            color: var(--success);
            border-color: rgba(169,245,188,0.24);
        }
        .back {
            margin-top: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 0.92rem;
        }
        a { color: var(--gold-soft); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .divider {
            margin: 20px 0 6px;
            border: none;
            border-top: 1px solid rgba(226,179,71,0.18);
        }
        .strength-bar {
            height: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            margin-top: 6px;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.3s ease, background 0.3s ease;
        }
        .strength-label {
            font-size: 0.76rem;
            margin-top: 4px;
            color: var(--muted);
            min-height: 14px;
        }
    </style>
</head>
<body>
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="{{ url_for('static', filename='bg.mp4') }}" type="video/mp4">
    </video>
    <div class="backdrop"></div>
    <div class="dust"></div>

    <main class="layout">
        <section class="card">
            <div class="logo-wrap">
                <img src="{{ url_for('static', filename='images_theepak/pianova_logo.png') }}" alt="Pianova">
            </div>
            <div class="icon">🔑</div>
            <h1>Reset Password</h1>
            <p class="subtext">Enter your username and choose a new password.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="post" id="resetForm">
                <div>
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" placeholder="Your account username" required autocomplete="username">
                </div>
                <hr class="divider">
                <div>
                    <label for="new_password">New Password</label>
                    <input id="new_password" name="new_password" type="password" placeholder="Enter new password" required autocomplete="new-password" oninput="checkStrength(this.value)">
                    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>
                <div>
                    <label for="confirm_password">Confirm New Password</label>
                    <input id="confirm_password" name="confirm_password" type="password" placeholder="Repeat new password" required autocomplete="new-password">
                </div>
                <button type="submit">Reset Password</button>
            </form>

            <p class="back">Remember it? <a href="{{ url_for('login') }}">Back to Login</a></p>
        </section>
    </main>

    <script>
        function checkStrength(val) {
            const fill = document.getElementById('strengthFill');
            const label = document.getElementById('strengthLabel');
            let score = 0;
            if (val.length >= 4) score++;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { pct: '0%',   color: 'transparent', text: '' },
                { pct: '25%',  color: '#ff6b6b',     text: 'Weak' },
                { pct: '50%',  color: '#ffa94d',     text: 'Fair' },
                { pct: '75%',  color: '#f3c040',     text: 'Good' },
                { pct: '100%', color: '#69db7c',     text: 'Strong' },
                { pct: '100%', color: '#40c057',     text: 'Very Strong' },
            ];
            const lvl = levels[Math.min(score, 5)];
            fill.style.width = lvl.pct;
            fill.style.background = lvl.color;
            label.textContent = lvl.text;
            label.style.color = lvl.color;
        }

        document.getElementById('resetForm').addEventListener('submit', function(e) {
            const np = document.getElementById('new_password').value;
            const cp = document.getElementById('confirm_password').value;
            if (np !== cp) {
                e.preventDefault();
                const cp_input = document.getElementById('confirm_password');
                cp_input.style.borderColor = 'rgba(255,100,100,0.7)';
                cp_input.style.boxShadow = '0 0 0 3px rgba(255,80,80,0.2)';
                cp_input.focus();
            }
        });
    </script>
</body>
</html>
