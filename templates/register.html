<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Pianova Account</title>
    <style>
        :root {
            --ink: #0a0906;
            --gold: #e1b348;
            --gold-soft: #f3d68f;
            --text: #f6ebd2;
            --muted: #d9c8a4;
            --panel: rgba(10, 10, 10, 0.58);
            --border: rgba(226, 179, 71, 0.38);
            --danger: #ef8a8a;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #070603;
            color: var(--text);
            overflow: hidden;
        }

        .video-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5) saturate(1.1);
            z-index: -3;
        }

        .backdrop {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 78%, rgba(243, 193, 74, 0.5), rgba(243, 193, 74, 0.06) 28%, rgba(0, 0, 0, 0) 55%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0.78));
            z-index: -2;
        }

        .dust {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                radial-gradient(circle, rgba(255, 221, 137, 0.42) 1px, transparent 1px),
                radial-gradient(circle, rgba(245, 201, 98, 0.28) 1px, transparent 1px);
            background-size: 3px 3px, 5px 5px;
            background-position: 0 0, 2px 3px;
            opacity: 0.35;
            animation: drift 20s linear infinite;
            z-index: -1;
        }

        .layout {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(460px, 100%);
            padding: 32px;
            border-radius: 24px;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 228, 169, 0.06);
            backdrop-filter: blur(8px);
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            letter-spacing: 0.05em;
            color: var(--gold-soft);
            text-shadow: 0 0 28px rgba(241, 193, 91, 0.28);
        }

        p {
            color: var(--muted);
            line-height: 1.45;
        }

        .subtext {
            margin-top: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 0.95rem;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #f3dbab;
        }

        input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 13px;
            border: 1px solid rgba(243, 202, 109, 0.2);
            background: rgba(12, 10, 5, 0.65);
            color: var(--text);
            transition: border-color 0.22s ease, box-shadow 0.22s ease;
        }

        input::placeholder {
            color: rgba(239, 217, 168, 0.48);
        }

        input:focus {
            outline: none;
            border-color: rgba(243, 203, 113, 0.72);
            box-shadow: 0 0 0 3px rgba(223, 180, 77, 0.2);
        }

        button {
            border: 0;
            border-radius: 13px;
            margin-top: 4px;
            padding: 13px 18px;
            font-weight: 700;
            letter-spacing: 0.03em;
            background: linear-gradient(140deg, #c7912f, #f4cd73 50%, #ab7723);
            color: #1f1402;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            box-shadow: 0 10px 24px rgba(183, 129, 31, 0.33);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(183, 129, 31, 0.4);
        }

        .flash {
            margin-bottom: 12px;
            padding: 11px 12px;
            border-radius: 11px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 146, 146, 0.25);
            background: rgba(255, 90, 90, 0.14);
            color: #ffaca1;
        }

        .signin {
            margin-top: 16px;
            text-align: center;
            font-size: 0.92rem;
        }

        a {
            color: var(--gold-soft);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(24px); }
        }

        @media (max-width: 560px) {
            .card {
                padding: 24px 20px;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <video class="video-bg" autoplay muted loop playsinline>
        <source src="{{ url_for('static', filename='bg.mp4') }}" type="video/mp4">
    </video>
    <div class="backdrop"></div>
    <div class="dust"></div>
    <main class="layout">
        <section class="card">
            <h1>Create Account</h1>
            <p class="subtext">Join Pianova and start your interactive piano lessons today.</p>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="post">
                <div>
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" placeholder="Choose username" required>
                </div>
                <div>
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Create password" required>
                </div>
                <div>
                    <label for="confirm_password">Confirm password</label>
                    <input id="confirm_password" name="confirm_password" type="password" placeholder="Confirm password" required>
                </div>
                <button type="submit">Create account</button>
            </form>
            <p class="signin">Already registered? <a href="{{ url_for('login') }}">Go back to login</a>.</p>
        </section>
    </main>
</body>
</html>
